<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포트폴리오 | 윤준식</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f7f9;           /* 밝은 배경 */
      --card: #ffffff;         /* 카드 흰색 */
      --border: #e1e4e8;       /* 테두리 연하게 */
      --accent: #2563eb;       /* 강조 블루 */
      --text: #1f2937;         /* 짙은 회색 텍스트 */
      --muted: #6b7280;        /* 설명용 회색 */
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; line-height: 1.6; }

    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }

    /* 섹션 구분 */
    section { padding: 4rem 0; border-bottom: 1px solid var(--border); }
    
    /* 이미지 스타일 */
    .rehab-img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 2rem;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }

    /* 카드 스타일 */
    .card { background: var(--card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }

    /* 헤더 및 타이틀 */
    h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    .sec-title { font-size: 1.8rem; margin-bottom: 1.5rem; color: var(--accent); }

    @media (max-width: 768px) { .container { padding: 1rem; } }
  </style>
</head>
<body>

<div class="container">
  <!-- 히어로 섹션 -->
  <header style="padding: 4rem 0;">
    <h1>안녕하세요, 윤준식입니다.</h1>
    <p>인공지능공학 전공 | 의료 및 재활 AI 분야 엔지니어를 꿈꿉니다.</p>
  </header>

  <!-- About 섹션 (사진 포함) -->
  <section id="about">
    <h2 class="sec-title">About Me</h2>
    <!-- 여기에 재활 관련 이미지를 추가하세요 -->
    <img src="image_f2bda3.png" alt="재활 훈련 이미지" class="rehab-img">
    <div class="card">
      <p>의료 AI와 재활치료 보조 시스템 개발에 깊은 관심이 있습니다. 물리치료학을 복수전공하며 도메인 지식을 넓히고 있습니다.</p>
    </div>
  </section>

  <!-- 나머지 섹션들은 위와 같이 <section> 태그로 감싸서 구분 -->
  <section id="skills">
    <h2 class="sec-title">Skills</h2>
    <div class="card">
      <p>Python, PyTorch, Linux 환경에서의 개발 역량을 갖추고 있습니다.</p>
    </div>
  </section>
</div>

<footer style="text-align: center; padding: 2rem; color: var(--muted);">
  &copy; 2026 Junsik Yoon
</footer>

</body>
</html>
